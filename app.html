<!DOCTYPE html>
<html>
<head>
<title>Student Form</title>
</head>

<body>

<h2>Add Student</h2>

<form action="/submit" method="POST">

<label>Name</label>
<input type="text" name="name" required><br><br>

<label>SAP ID</label>
<input type="text" name="sapid" required><br><br>

<label>Age</label>
<input type="number" name="age" required><br><br>

<label>Marks</label>
<input type="number" name="marks" required><br><br>

<button type="submit">Submit</button>

</form>


<hr>

<h2>Filter Student</h2>

<select id="studentDropdown"></select>
<button onclick="loadStudent()">Show Details</button>

<div id="result"></div>


<script>

async function loadNames(){

    const res = await fetch("/students")
    const names = await res.json()

    const dropdown = document.getElementById("studentDropdown")

    names.forEach(n=>{
        let option = document.createElement("option")
        option.value = n
        option.text = n
        dropdown.appendChild(option)
    })

}

async function loadStudent(){

    const name = document.getElementById("studentDropdown").value

    const res = await fetch("/student/" + name)
    const data = await res.json()

    document.getElementById("result").innerHTML =
        "Name: " + data.name + "<br>" +
        "SAPID: " + data.sapid + "<br>" +
        "Age: " + data.age + "<br>" +
        "Marks: " + data.marks

}

loadNames()

</script>

</body>
</html>
